<main class="layout-container">
  <div class="core-card">
    <header class="pt-8 pb-6 text-center border-b border-gray-50">
      <h1 class="text-3xl font-extrabold tracking-tight text-gray-900">
        Task Zero
      </h1>
      <p class="text-gray-400 text-sm mt-1">Focus on what matters today</p>
    </header>

    <!-- Add Task Component -->
    <div class="px-4 pt-4">
      <app-add-task (add)="onAddTask($event)"></app-add-task>
    </div>

    <!-- Tab Buttons -->
    <div class="flex border-b px-4">
      <button 
        id="tab-today"
        class="flex-1 py-2 text-sm font-semibold transition-colors"
        [class.text-gray-900]="currentTab() === 'today'"
        [class.border-b-2]="currentTab() === 'today'"
        [class.border-gray-800]="currentTab() === 'today'"
        [class.text-gray-400]="currentTab() !== 'today'"
        (click)="setTab('today')">
        Today
      </button>
      <button 
        id="tab-scheduled"
        class="flex-1 py-2 text-sm font-semibold transition-colors"
        [class.text-gray-900]="currentTab() === 'scheduled'"
        [class.border-b-2]="currentTab() === 'scheduled'"
        [class.border-gray-800]="currentTab() === 'scheduled'"
        [class.text-gray-400]="currentTab() !== 'scheduled'"
        (click)="setTab('scheduled')">
        Scheduled
      </button>
      <button 
        id="tab-done"
        class="flex-1 py-2 text-sm font-semibold transition-colors"
        [class.text-gray-900]="currentTab() === 'done'"
        [class.border-b-2]="currentTab() === 'done'"
        [class.border-gray-800]="currentTab() === 'done'"
        [class.text-gray-400]="currentTab() !== 'done'"
        (click)="setTab('done')">
        Done
      </button>
    </div>

    <!-- Task List Component — shows filteredTasks based on active tab -->
    <div class="px-4 pb-6 flex-1">
      <app-task-list [tasks]="filteredTasks()" (toggle)="onToggleTask($event)" (delete)="onDeleteTask($event)"></app-task-list>
    </div>
  </div>
</main>
