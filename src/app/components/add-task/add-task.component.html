<div class="mb-4 flex flex-col gap-2">
  <!-- Primary title input -->
  <input #taskInput type="text" placeholder="Add a task..."
    class="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent transition-all text-gray-900 placeholder-gray-400 text-[16px] shadow-sm"
    (keyup.enter)="onAdd()" />

  <!-- Metadata row: datetime, duration, label, repeat -->
  <div class="flex flex-wrap gap-2">
    <input type="datetime-local"
      class="flex-1 min-w-[160px] px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-800 transition-all"
      [value]="dueDateTime()" (change)="dueDateTime.set($any($event.target).value)" />
    <input type="number" min="1" placeholder="Duration (min)"
      class="w-36 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-800 transition-all"
      [value]="duration()" (input)="duration.set($any($event.target).value)" />
    <input type="text" placeholder="Label"
      class="w-28 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-800 transition-all"
      [value]="label()" (input)="label.set($any($event.target).value)" />
    <select
      class="px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-800 transition-all"
      [value]="repeat()" (change)="repeat.set($any($event.target).value)">
      <option value="none">No repeat</option>
      <option value="daily">Daily</option>
      <option value="weekly">Weekly</option>
    </select>
  </div>
</div>
