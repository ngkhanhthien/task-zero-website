<ul class="space-y-3 mt-4">
  @for (task of tasks(); track task.id) {
    <li class="p-4 bg-gray-50 border border-gray-100 rounded-xl hover:bg-gray-100 transition-colors flex items-center shadow-sm">
      <span class="text-gray-800 font-medium">{{ task.title }}</span>
    </li>
  } @empty {
    <li class="text-center text-gray-400 py-8 text-sm">
      Chưa có task nào cả. (Signal Empty)
    </li>
  }
</ul>
